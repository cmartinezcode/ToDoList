<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>To-Do App</title>

    <!-- <link href="../src/output.css" rel="stylesheet" /> Muy lento, en produccion copmpilamos, en desarrollo usamos cdn-->

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body class="font-mono">
    <div class="bg-gray-100 flex items-center justify-center min-h-screen">
      <div class="bg-white w-full max-w-md p-6 rounded-2xl shadow-lg p-">
        <!-- Título -->
        <div class="flex-col justify-center gap-0.5 mb-2 items-center pb-1">
          <div id="container_title" class="flex justify-center w-full">
            <svg class="w-6 h-6 text-green-600">
              <use href="../dist/symbol/svg/sprite.css.svg#edit"></use>
            </svg>
            <h1 class="text-2xl w font-bold">ToDo List</h1>
          </div>
          <ul class="flex justify-between w-full pt-2 ">
            <li onclick="getTasks()" class="text-cyan-700 transition-all duration-300 hover:cursor-pointer hover:text-blue-700  hover:-translate-y-0.5">Todas</li>
            <li onclick="filterPendingTasks()" class="text-cyan-700 transition-all duration-300 hover:cursor-pointer hover:text-blue-700  hover:-translate-y-0.5">Pendientes</li>
            <li onclick="filterCompletedTasks()" class="text-cyan-700 transition-all duration-300 hover:cursor-pointer hover:text-blue-700  hover:-translate-y-0.5">Completadas</li>
          </ul>
        </div>

        <!-- Input -->
        <div class="flex gap-0.5 mb-4 align-middle">
          <input
            id="taskText"
            type="text"
            placeholder="Agregar tarea..."
            class="flex-1 border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-1 focus:ring-blue-300 h-10"
          />

          <svg
            id="createTaskButton"
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="icon icon-tabler icons-tabler-outline icon-tabler-send-2 w-9 h-9 text-blue-400 cursor-pointer"
          >
            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
            <path
              d="M4.698 4.034l16.302 7.966l-16.302 7.966a.503 .503 0 0 1 -.546 -.124a.555 .555 0 0 1 -.12 -.568l2.468 -7.274l-2.468 -7.274a.555 .555 0 0 1 .12 -.568a.503 .503 0 0 1 .546 -.124"
            />
            <path d="M6.5 12h14.5" />
          </svg>
        </div>

        <!-- Lista de tareas -->

        <ul class="space-y-2" id="taskList"></ul>
      </div>
      <div
        id="modalEditTask"
        class="pointer-events-none fixed inset-0 flex items-center justify-center bg-black/50 opacity-0"
      >
        <div
          class="w-80 flex flex-col rounded-lg gap-2 p-4 items-center bg-gray-300"
        >
          <span>Editar tarea</span>
          <input
            type="text"
            name=""
            class="border z-50 border-b-blue-500 focus:outline-none p-1 rounded-lg"
            id="editTaskInput"
          />
          <div id="buttonsModal" class="flex gap-2 pointer-events-none">
            <button
              id="modalButtonGuardar"
              class="bg-blue-600 rounded-md p-1 text-white cursor-pointer"
            >
              Guardar
            </button>
            <button
              id="modalButtonCancelar"
              class="bg-red-600 rounded-md p-1 text-white cursor-pointer"
            >
              Cancelar
            </button>
          </div>
        </div>
      </div>

      <div
        id="alertStatus"
        class="pointer-events-none fixed inset-0 flex items-center justify-center bg-black/50 opacity-0"
      >
        <div
          class="w-80 flex flex-col rounded-lg gap-2 p-4 items-center bg-gray-300"
        >
          <span id="msgAlert"></span>
          <button
            id="alertOk"
            class="bg-emerald-500 rounded-md p-1 text-black cursor-pointer"
          >
            Ok
          </button>
          <button
            id="cancelarAlert"
            class="bg-red-500 rounded-md p-1 text-black cursor-pointer"
          >
            Cancelar
          </button>
        </div>
      </div>
    </div>
    <script src="../js/app.js"></script>
  </body>
</html>
