<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>To-Do App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <!-- <link href="../src/output.css" rel="stylesheet" /> Muy lento, en produccion copmpilamos, en desarrollo usamos cdn-->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body class="font-mono">
    <div class="bg-gray-100 flex  lg:items-center lg:justify-center min-h-screen">
      <div class="bg-white w-full md:w-3xl rounded-2xl shadow-lg">
        <!-- Título -->
        <div id="container-header" 
        class="bg-white shadow mb-2 items-center pb-1 fixed top-0 left-0 w-full z-10 h-56 p-3 ">
          <div class="mb-8 mt-6">
            <div class="flex gap-4 justify-center items-center w-full">
              <i class="fa-solid fa-business-time text-3xl text-cyan-700"></i>
              <p class="text-3xl font-bold text-gray-700">ToDo List</p>
            </div>
            <div class="flex justify-center items-center gap-2">
              <p> Organiza tu día </p> 
             <i 
              class="text-red-700 fa-solid fa-heart text-md"
            > </i>
            </div>

          </div>
          <ul class="flex justify-between mt-2 mb-2 ">
            <li onclick="getTasks()" class="text-lg">Tareas</li>
            <li onclick="filterPendingTasks()" class="text-lg">Pendientes</li>
            <li onclick="filterCompletedTasks()" class="text-lg">Completadas</li>
            
          </ul>

          <!-- Input -->
          <div class="flex items-center gap-3 mb-5">
            <!-- items-center es igual a align-item: center-->
            <input
              id="taskText"
              type="text"
              placeholder="Nueva tarea..."
              class="text-lg flex-1 border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-1 focus:ring-blue-300"
            />
                       
            <i id="createTaskButton" class="text-4xl fa-solid fa-circle-plus text-emerald-700"></i>
            
          </div>
        </div>

        <!-- Lista de tareas -->

        <ul class="pt-56 mt-2 pl-2 pr-2 space-y-2" id="taskList"></ul>
      </div>
      <div
        id="modalEditTask"
        class="pointer-events-none fixed inset-0 flex items-center justify-center bg-black/50 opacity-0"
      >
        <div
          class="w-80 flex flex-col rounded-lg gap-2 p-4 items-center bg-gray-300"
        >
          <span>Editar tarea</span>
          <input
            type="text"
            name=""
            class="border z-50 border-b-blue-500 focus:outline-none p-1 rounded-lg"
            id="editTaskInput"
          />
          <div id="buttonsModal" class="flex gap-2 pointer-events-none">
            <button
              id="modalButtonGuardar"
              class="bg-blue-600 rounded-md p-1 text-white cursor-pointer"
            >
              Guardar
            </button>
            <button
              id="modalButtonCancelar"
              class="bg-red-600 rounded-md p-1 text-white cursor-pointer"
            >
              Cancelar
            </button>
          </div>
        </div>
      </div>

      <div
        id="alertStatus"
        class="transition duration-600 pointer-events-none fixed inset-0 flex items-center justify-center bg-black/50 opacity-0 z-10000"
      >
        <div
          class="w-4/5 flex flex-col rounded-lg gap-2 p-4 items-center bg-gray-300"
        >
          <span id="msgAlert"></span>
         <div>
           <button
            id="alertOk"
            class="bg-emerald-700 rounded-md p-0.5 cursor-pointer text-amber-50 w-20"
          >
          Entiendo
          </button>
          <button
            id="cancelarAlert"
            class="bg-red-700 rounded-md p-0.5 text-amber-50 w-20 cursor-pointer"
          >
          Cancelar
          </button>
         </div>
        </div>
      </div>
    </div>
    <script src="../js/app.js"></script>
  </body>
</html>
