<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="../css/output.css" rel="stylesheet" />

    <style></style>
    <title>Registerar Todo-List</title>
  </head>
  <body class="font-mono min-h-screen flex flex-col bg-primary">
    <header
      class="w-full flex gap-3 px-6 py-4 border shadow justify-between items-center bg-primary"
    >
      <span class="brand-font text-xl font-semibold text-[#1E3A5F]"
        >To-Do App</span
      >
      <a
        href="login.html"
        class="bg-secondary text-md font-bold transition-all duration-100 hover:-translate-y-1 text-white px-3 py-2 rounded-full hover:bg-[#1E3A5F]"
        >Ingresar</a
      >
    </header>
    <main class="my-10 flex flex-1 justify-center items-center">
      <div class="flex flex-1 justify-center items-center">
        <div class="w-full max-w-100 mx-4 shadow rounded-md bg-white">
          <div
            class="bg-secondary flex items-center gap-6 justify-center rounded-t-md py-3"
          >
            <a href="../index.html"
              ><i class="fa-solid fa-arrow-left text-white"></i
            ></a>
            <h3 class="text-white text-xl py-2">Ingresar</h3>
          </div>
          <div class="header-body flex flex-col items-center">
            <div class="w-4/5 flex justify-center my-4 h-9">
              <div
                class="bg-secondary rounded-l-md flex justify-center items-center px-3"
              >
                <i class="text-white fa-solid fa-user"></i>
              </div>
              <input
                id="username"
                class="shadow text-sm p-1 flex-1 rounded-r-md bg-white transition-colors duration-300 focus:border-2 focus:border-cyan-600 border-2 outline-none border-gray-700/70 focus:placeholder:text-gray-600/40"
                type="text"
                placeholder="Usuario"
              />
            </div>
            <div class="relative flex justify-center w-4/5 h-9 mb-5">
              <div
                class="bg-secondary rounded-l-md flex justify-center items-center px-3"
              >
                <i class="text-white fa-solid fa-lock"></i>
              </div>
              <input
                id="password"
                class="shadow text-sm p-1 flex-1 rounded-r-md bg-white transition-colors duration-300 focus:border-2 focus:border-cyan-600 border-2 outline-none border-gray-700/70 focus:placeholder:text-gray-600/40"
                type="password"
                placeholder="Contraseña"
              />
              <button
                type="button"
                id="togglePassword"
                class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 transition-colors"
              >
                <i id="eyeIcon" class="fa-regular fa-eye-slash text-lg"></i>
              </button>
            </div>
          </div>

          <div class="header-footer flex justify-center flex-col items-center">
            <button
              id="loginButton"
              onclick="sendDataUser()"
              class="bg-secondary cursor-pointer px-3 py-1 w-2/5 rounded-md text-white mb-3"
            >
              Entrar
            </button>
            <div class="flex gap-3 flex-col justify-center items-center mb-5">
              <span class="text-[#1E3A5F]">No tienes una cuenta?</span>
              <a
                href="register.html"
                class="bg-secondary text-md font-bold transition-all duration-100 hover:-translate-y-1 text-white px-3 py-2 rounded-full hover:bg-[#1E3A5F]"
                >Registrate</a
              >
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="border-t-[.5px] bg-primary shadow">
      <div
        class="w-full bg-transparent py-6 px-8 flex flex-col sm:flex-row justify-between items-center gap-4 text-[#1E3A5F]/90 max-w-7xl text-lg mx-auto"
      >
        <div class="flex items-center gap-1.5">
          <span>Hecho con</span>
          <span class="text-red-500 animate-pulse">❤️</span>
          <span>y mucho JavaScript</span>
        </div>
        <div class="flex items-center gap-6 text-3xl text-[#1E3A5F]/80">
          <a
            href="https://github.com/cmartinezcode/"
            class="hover:text-secondary hover:scale-120 transition-transform"
            ><i class="fab fa-github"></i
          ></a>
          <a
            href="https://www.linkedin.com/in/cmartinezcode/"
            class="hover:text-secondary hover:scale-120 transition-transform"
            ><i class="fab fa-linkedin"></i
          ></a>
          <a
            href="mailto:martinez.1705.cristian@gmail.com"
            class="hover:text-secondary hover:scale-120 transition-transform"
            ><i class="fas fa-envelope"></i
          ></a>
        </div>
      </div>
    </footer>
    <script src="../js/config.js"></script>
    <script src="../js/login.js"></script>
  </body>
</html>
